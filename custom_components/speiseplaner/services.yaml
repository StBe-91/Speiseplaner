add_rezept:
  name: Rezept hinzufügen
  fields:
    name:
      required: true
      example: "Lasagne"
    portionen:
      required: true
      example: 4
    zutaten:
      required: true
      example:
        - name: "Hackfleisch"
          anzahl: 500
          einheit: "g"
          kategorie: "Fleisch"
    rezeptanleitung:
      example: "Zutaten schichten und 40 Minuten backen."

update_rezept:
  name: Rezept bearbeiten
  fields:
    rezept_id:
      required: true
      example: "uuid"
    name:
      required: true
      example: "Lasagne"
    portionen:
      required: true
      example: 4
    zutaten:
      required: true
      example:
        - name: "Hackfleisch"
          anzahl: 500
          einheit: "g"
          kategorie: "Fleisch"
    rezeptanleitung:
      example: "Zutaten schichten und 40 Minuten backen."

delete_rezept:
  name: Rezept löschen
  fields:
    rezept_id:
      required: true
      example: "uuid"

add_speiseplaneintrag:
  name: Eintrag zum Speiseplan hinzufügen
  fields:
    datum:
      required: true
      example: "2026-07-20"
    rezept_id:
      required: true
      example: "uuid"
    portionen:
      required: true
      example: 4

update_speiseplaneintrag:
