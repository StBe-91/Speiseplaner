      required: true
      example: "uuid"
    datum:
      required: true
      example: "2026-07-20"
    rezept_id:
      required: true
      example: "uuid"
    portionen:
      required: true
      example: 4

delete_speiseplaneintrag:
  name: Speiseplaneintrag löschen
  fields:
    speiseplaneintrag_id:
      required: true
      example: "uuid"

add_kategorie:
  name: Zutatenkategorie hinzufügen
